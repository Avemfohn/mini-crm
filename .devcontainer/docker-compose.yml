services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.12-bookworm
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: minierp
      POSTGRES_PASSWORD: minierp
      POSTGRES_DB: minierp

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minierp
      POSTGRES_PASSWORD: minierp
      POSTGRES_DB: minierp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minierp -d minierp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
